; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = production

[env:production]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	tobiasschuerg/ESP8266 Influxdb@^3.9.0
	beegee-tokyo/DHT sensor library for ESPx@^1.18
	jonblack/arduino-fsm@^2.2.0
	jrullan/StateMachine@^1.0.11
	ivanseidel/LinkedList@0.0.0-alpha+sha.dac3874d28
	Adafruit_VL53L0X @ ^1.1.2
	adafruit/Adafruit TSL2591 Library@^1.4.2
	bblanchon/ArduinoJson@^6.19.1
	bblanchon/StreamUtils@^1.6.1
	majicdesigns/MD_MAX72XX@^3.3.0
	majicdesigns/MD_Parola@^3.5.6
